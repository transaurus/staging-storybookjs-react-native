appId: host.exp.Exponent
name: Take screenshots of all Storybook stories
---
- stopApp: host.exp.Exponent
- openLink: 'exp://127.0.0.1:8081/--/'
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: '-wont be found-'
    optional: true
    timeout: 2500

# Story ControlExamples-ControlExample - Example
- runScript:
    file: 'storybook-screenshots.select-story-sync.js'
    env:
      STORY_ID: 'controlexamples-controlexample--example'
- waitForAnimationToEnd
- assertVisible:
    id: 'controlexamples-controlexample--example'
- assertScreenshot: 'ControlExamples-ControlExample---Example.png'

